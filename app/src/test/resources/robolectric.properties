# Every Robolectric test runs against TestSimmoApp, which is a real SimmoApp
# with one change: an isolated in-memory state store per test instead of the
# process-wide on-disk singleton. Reusing that singleton across tests can bind
# it to a torn-down sandbox whose reads always fail, which the holder's
# unbounded read retry turns into a state that never loads — hanging any state
# await for minutes. See TestSimmoApp.
application=app.simmo.TestSimmoApp
